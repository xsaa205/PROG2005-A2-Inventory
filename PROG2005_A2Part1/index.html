<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Inventory System - Part 1</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>📦 Inventory Management System</h1>

        <!-- Add / Edit Form -->
        <div class="form-card">
            <h2>Add / Edit Item</h2>
            <input type="number" id="itemId" placeholder="Item ID (unique positive integer)" autocomplete="off">
            <input type="text" id="itemName" placeholder="Item Name" autocomplete="off">
            <select id="category">
                <option value="Electronics">Electronics</option>
                <option value="Furniture">Furniture</option>
                <option value="Clothing">Clothing</option>
                <option value="Tools">Tools</option>
                <option value="Miscellaneous">Miscellaneous</option>
            </select>
            <input type="number" id="quantity" placeholder="Quantity (integer)">
            <input type="number" id="price" step="0.01" placeholder="Price">
            <input type="text" id="supplier" placeholder="Supplier Name">
            <select id="stockStatus">
                <option value="In Stock">In Stock</option>
                <option value="Low Stock">Low Stock</option>
                <option value="Out of Stock">Out of Stock</option>
            </select>
            <select id="popular">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
            <input type="text" id="comment" placeholder="Comment (optional)">
            <div class="button-group">
                <button id="addBtn">➕ Add Item</button>
                <button id="updateBtn">✏️ Update (by Name)</button>
                <button id="clearStorageBtn" class="secondary">🗑️ Clear Data</button>
            </div>
            <div id="message"></div>
        </div>

        <!-- Search Area -->
        <div class="search-area">
            <input type="text" id="searchName" placeholder="Search by item name...">
            <button id="searchBtn">🔍 Search</button>
            <button id="showAllBtn">📋 Show All</button>
            <button id="showPopularBtn">⭐ Show Popular</button>
        </div>

        <!-- Inventory Table -->
        <div class="table-wrapper">
            <h2>Inventory Items</h2>
            <table id="inventoryTable">
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Category</th><th>Qty</th><th>Price</th><th>Supplier</th><th>Stock</th><th>Popular</th><th>Comment</th><th>Actions</th></tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="10">📭 No items yet. Add some!</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Custom Delete Confirmation Dialog -->
    <dialog id="deleteDialog">
        <p id="deleteDialogMessage">Are you sure you want to delete this item?</p>
        <div class="dialog-buttons">
            <button id="confirmDeleteBtn" class="danger">Confirm Delete</button>
            <button id="cancelDeleteBtn">Cancel</button>
        </div>
    </dialog>

    <script src="inventory.js"></script>
</body>
</html>
